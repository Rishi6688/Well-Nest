<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WellNest — Holistic Health Companion</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="global.css">
  <script src="lang.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- LANGUAGE BAR -->
    <div class="lang-bar">
      <span class="lang-label" data-i18n="lang_lbl">Language:</span>
      <div class="lang-scroll">
        <button class="lang-pill active">🇬🇧 English</button>
        <button class="lang-pill">🇮🇳 हिंदी</button>
        <button class="lang-pill">🇮🇳 தமிழ்</button>
        <button class="lang-pill">🇮🇳 తెలుగు</button>
        <button class="lang-pill">🇮🇳 ಕನ್ನಡ</button>
        <button class="lang-pill">🇫🇷 Français</button>
        <button class="lang-pill">🇪🇸 Español</button>
      </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
      <div class="hero-label" data-i18n="hero_sup">Your Wellness Companion</div>
      <h1 class="hero-title font-playfair"><span data-i18n="hero_t1">Feel better,</span><br><span data-i18n="hero_t2">naturally.</span></h1>
      <div class="hero-subtitle" data-i18n="hero_sub">Home remedies · Guided recipes · Doctor finder</div>
      
      <div class="search-box">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 21L15.0001 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <input type="text" class="search-input" data-i18n-ph="search_ph" placeholder="Type a symptom or condition...">
      </div>

      <div class="quick-tags-container">
        <button class="quick-tag">Cold & Fever</button>
        <button class="quick-tag">Headache</button>
        <button class="quick-tag">Diabetes</button>
        <button class="quick-tag">Cough</button>
        <button class="quick-tag">Tiredness</button>
      </div>
    </div>

    <!-- SYMPTOM GRID SECTION -->
    <div class="symptom-section">
      <h2 class="section-title" data-i18n="sec_sym_t">Choose your symptoms</h2>
      <p class="section-subtitle" data-i18n="sec_sym_s">Select all that apply for personalised recommendations</p>
      
      <div class="symptom-grid">
        <button class="symptom-chip">
          <span class="symptom-icon">🤧</span>
          <span class="symptom-label">Cold & Fever</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">🤕</span>
          <span class="symptom-label">Headache</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">😮‍💨</span>
          <span class="symptom-label">Cough</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">😴</span>
          <span class="symptom-label">Tiredness</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">🩸</span>
          <span class="symptom-label">Diabetes</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">❤️</span>
          <span class="symptom-label">Hypertension</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">🤢</span>
          <span class="symptom-label">Stomach Ache</span>
        </button>
        <button class="symptom-chip">
          <span class="symptom-icon">😰</span>
          <span class="symptom-label">Anxiety</span>
        </button>
      </div>

      <button class="btn-primary" id="genPlanBtn" data-i18n="btn_plan">
        Get my personalised plan &rarr;
      </button>
    </div>

    <!-- BOTTOM NAV BAR -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" data-i18n="nav_home">Home</span>
      </a>
      <a href="results.html" class="nav-item">
        <span class="nav-icon">💊</span>
        <span class="nav-label" data-i18n="nav_rem">Remedies</span>
      </a>
      <a href="cook.html" class="nav-item">
        <span class="nav-icon">🍳</span>
        <span class="nav-label" data-i18n="nav_cook">Cook Guide</span>
      </a>
      <a href="help.html" class="nav-item">
        <span class="nav-icon">📍</span>
        <span class="nav-label" data-i18n="nav_help">Find Help</span>
      </a>
    </nav>

  </div>
  <script src="app.js"></script>
</body>
</html>
